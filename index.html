<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

:root{
--main:#ee4d2d;
--bg:#f4f6f8;
}

body{
margin:0;
font-family:system-ui;
background:var(--bg);
display:flex;
justify-content:center;
}

.wrapper{
width:100%;
max-width:420px;
margin-top:40px;
padding:20px;
border-radius:16px;
background:#ffffff;
box-shadow:0 6px 18px rgba(0,0,0,.12);
text-align:center;
}

.logo{
width:180px;
margin:auto;
margin-bottom:10px;
}

.appname{
font-size:22px;
font-weight:700;
color:#333;
margin-bottom:10px;
}

input,button{
width:100%;
box-sizing:border-box;
}

input{
padding:14px;
border:2px solid #ddd;
outline:none;
border-radius:10px;
font-size:18px;
text-align:center;
margin-top:10px;
}

input:focus{
border-color:var(--main);
}

button{
margin-top:12px;
padding:13px;
border:none;
border-radius:10px;
font-size:16px;
font-weight:600;
cursor:pointer;
color:white;
background:var(--main);
}

video{
width:100%;
margin-top:12px;
border-radius:10px;
}

.result{
margin-top:20px;
font-size:18px;
font-weight:600;
}

.time{
font-size:14px;
color:#666;
margin-top:4px;
}

.support{
margin-top:20px;
font-size:12px;
color:#777;
}

input::placeholder{
font-size:13px;
}

</style>

</head>

<body>

<div class="wrapper">

<img class="logo" src="https://i.imgur.com/g7DWGWX.png">

<div class="appname">QUẢN LÝ GIỜ IN / OUT</div>

<input id="opsid" placeholder="Nhập hoặc scan OPSID">

<button onclick="submitOPS()">Xác nhận</button>

<button onclick="startCamera()">📷 Mở Camera Scan</button>

<video id="camera" autoplay></video>

<div class="result" id="status"></div>
<div class="time" id="time"></div>

<div class="support">
For support: Tri.caoquoc@spxexpress
</div>

</div>

<script>

const API="https://script.google.com/a/macros/spxexpress.com/s/AKfycbwlvce_JvPQHf2HG-U0PMAXMktQ8yJSF9-Ga4KTMKikMJKpQv-GO19WIwJ9Ry4bKxDRJw/exec";

function submitOPS(){

var ops=document.getElementById("opsid").value.trim();
if(!ops) return;

fetch(API,{
method:"POST",
body:JSON.stringify({opsid:ops})
})
.then(r=>r.json())
.then(res=>{

document.getElementById("status").innerText =
res.opsid+" - "+res.name+" - "+res.rank+" - "+res.status;

document.getElementById("time").innerText=res.time;

document.getElementById("opsid").value="";
document.getElementById("opsid").focus();

});

}

document.getElementById("opsid").addEventListener("keypress",function(e){
if(e.key==="Enter") submitOPS();
});


let detector;
let video=document.getElementById("camera");

async function startCamera(){

const stream=await navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"}
});

video.srcObject=stream;

detector=new BarcodeDetector({
formats:["code_128","qr_code","ean_13","ean_8"]
});

scanLoop();

}

async function scanLoop(){

try{

const barcodes=await detector.detect(video);

if(barcodes.length>0){

let code=barcodes[0].rawValue;

document.getElementById("opsid").value=code;

submitOPS();

}

}catch(e){}

requestAnimationFrame(scanLoop);

}

</script>

</body>
</html>
